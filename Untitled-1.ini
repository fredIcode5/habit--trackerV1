import { useState, useRef } from "react";

// ─────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────

const MAX_HABITS = 16;
const DAYS_EN       = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const DAY_LTRS      = ["L","M","M","J","V","S","D"];
const WEEKDAYS      = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const MONTHS_YEAR   = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const FLAME_TIERS = [
  { days: 80, color: "#00008B", label: "Légendaire"    },
  { days: 75, color: "#1E90FF", label: "Maître"        },
  { days: 60, color: "#40E0D0", label: "Expert"        },
  { days: 45, color: "#FFD700", label: "Avancé"        },
  { days: 30, color: "#FF8C00", label: "Confirmé"      },
  { days: 15, color: "#FF4500", label: "Intermédiaire" },
  { days:  1, color: "#FF0000", label: "Débutant"      },
];

// ─────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────

function todayISO() { return new Date().toISOString().slice(0, 10); }
function generateID() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

function getTier(streak) {
  if (streak < 1) return { color: "#2a2a2a", label: "Éteinte" };
  for (const t of FLAME_TIERS) { if (streak >= t.days) return t; }
  return { color: "#FF0000", label: "Débutant" };
}

function calcStreak(habitId, completions) {
  const today = new Date();
  let streak = 0;
  for (let i = 0; i < 400; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const dateISO = d.toISOString().slice(0, 10);
    if (completions.some((c) => c.habitId === habitId && c.date === dateISO)) { streak++; } else { break; }
  }
  return streak;
}

function calcBreaks(habitId, completions) {
  const dates = completions.filter((c) => c.habitId === habitId).map((c) => c.date).sort();
  if (dates.length === 0) return 0;
  let count = 0;
  for (let i = 1; i < dates.length; i++) {
    if ((new Date(dates[i]) - new Date(dates[i - 1])) / 86400000 > 1) count++;
  }
  return count;
}

function calcStreakStart(habitId, completions) {
  const today = new Date();
  let start = null;
  for (let i = 0; i < 400; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const dateISO = d.toISOString().slice(0, 10);
    if (completions.some((c) => c.habitId === habitId && c.date === dateISO)) { start = dateISO; } else { break; }
  }
  return start;
}

function formatDate(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleDateString("fr-FR", { day: "numeric", month: "short", year: "numeric" });
}

function calcLevel(xpTotal) {
  function xpForLevel(n) { return Math.round(500 * n * (1 + n * 0.3)); }
  let level = 1, xp = xpTotal;
  while (xp >= xpForLevel(level)) { xp -= xpForLevel(level); level++; }
  return { level, xpLeft: xp, xpLevel: xpForLevel(level) };
}

function getWeekDates() {
  const today = new Date(), dow = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d.toISOString().slice(0, 10);
  });
}

function getMonthDays() {
  const today = new Date();
  const nb = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
  return Array.from({ length: nb }, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth(), i + 1);
    return { date: d.toISOString().slice(0, 10), dow: d.getDay() === 0 ? 6 : d.getDay() - 1 };
  });
}

