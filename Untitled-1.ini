// ─────────────────────────────────────────────
// COMPONENT: Hero
// ─────────────────────────────────────────────

function Hero({ xpTotal, habits, completions }) {
  const { level, xpLeft, xpLevel } = calcLevel(xpTotal);
  const pct = Math.round((xpLeft / xpLevel) * 100);
  return (
    <main style={{ background: "linear-gradient(135deg, #141414 0%, #1c1410 100%)", display: "flex", alignItems: "center", justifyContent: "space-between", minHeight: 190, padding: "14px 36px", borderBottom: "1px solid #2a2a2a", gap: 20 }}>
      <div style={{ display: "flex", flexDirection: "column", gap: 10, flexShrink: 0 }}>
        <div>
          <div style={{ color: "#555", fontSize: 10, letterSpacing: "0.15em", textTransform: "uppercase" }}>Habit Tracker</div>
          <div style={{ color: "white", fontSize: 22, fontWeight: 800, marginTop: 3 }}>Track your Habits</div>
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
          <div style={{ color: "white", fontSize: 11 }}>🔥 Level {level} — {xpLeft} / {xpLevel} XP</div>
          <div style={{ width: 190, height: 7, background: "#2a2a2a", borderRadius: 10, overflow: "hidden", border: "1px solid #333" }}>
            <div style={{ height: "100%", width: `${pct}%`, background: "linear-gradient(90deg, #ce6e14, #ff9040)", borderRadius: 10, transition: "width 0.6s ease" }} />
          </div>
        </div>
      </div>
      <MiniChart completions={completions} />
      <FlameGrid habits={habits} completions={completions} />
    </main>
  );
}

// ─────────────────────────────────────────────
// COMPONENT: DateBar
// ─────────────────────────────────────────────

function DateBar({ selectedDate, onSelectDate, onOpenModal, completions }) {
  const [view, setView] = useState("week");
  const week      = getWeekDates();
  const month     = getMonthDays();
  const tod       = todayISO();
  const labelDate = new Date().toLocaleDateString("en-US", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  const hasCompletions = (date) => completions.some((c) => c.date === date);
  const sbv = (active) => ({ background: active ? "#ce6e14" : "#ccc", color: active ? "white" : "#444", border: "none", borderRadius: 7, padding: "5px 14px", fontSize: 13, cursor: "pointer" });

  return (
    <div style={{ background: "#e8e8e8", padding: "10px 24px", display: "flex", gap: 10, alignItems: "stretch" }}>
      <button onClick={onOpenModal}
        style={{ background: "#ce6e14", color: "white", border: "none", borderRadius: 10, fontSize: 15, cursor: "pointer", padding: "0 20px", flexShrink: 0, width: "22%" }}
        onMouseOver={(e) => (e.currentTarget.style.background = "#b85c10")}
        onMouseOut={(e)  => (e.currentTarget.style.background = "#ce6e14")}
      >
        + Manage habits
      </button>

      <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 6 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <button style={sbv(view === "week")}  onClick={() => setView("week")}>Week</button>
          <button style={sbv(view === "month")} onClick={() => setView("month")}>Month</button>
          <div style={{ marginLeft: "auto", background: "#d4d4d4", borderRadius: 7, padding: "4px 12px", fontSize: 13, color: "#333" }}>{labelDate}</div>
        </div>

        <div style={{ background: "rgba(0,0,0,0.65)", border: "1px solid #333", borderRadius: 7, height: 80, display: "flex", alignItems: "center", padding: "0 10px", overflow: "hidden" }}>
          {view === "week" && (
            <div style={{ display: "flex", width: "100%", height: "100%", alignItems: "center", justifyContent: "space-around" }}>
              {DAYS_EN.map((day, i) => {
                const date = week[i], sel = selectedDate === date, today = date === tod;
                return (
                  <div key={day} onClick={() => onSelectDate(date)}
                    style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1, cursor: "pointer", borderRadius: 10, padding: "4px 2px", border: `2px solid ${sel ? "#ce6e14" : "transparent"}`, background: sel ? "rgba(206,110,20,0.25)" : "transparent", transition: "all 0.2s" }}
                  >
                    <span style={{ color: today ? "#ce6e14" : "#ebebeb", fontSize: 13 }}>{day.slice(0, 3)}</span>
                    <div style={{ width: 20, height: 20, margin: "5px 0", background: hasCompletions(date) ? "#26ac14" : "#3a3a3a", borderRadius: 6, border: today ? "2px solid white" : "none" }} />
                  </div>
                );
              })}
            </div>
          )}
          {view === "month" && (
            <div style={{ display: "flex", alignItems: "center", gap: 4, overflowX: "auto", width: "100%", padding: "0 4px" }}>
              {month.map(({ date, dow }, i) => {
                const sel = selectedDate === date, today = date === tod, newWeek = dow === 0 && i > 0;
                return (
                  <div key={date} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    {newWeek && <div style={{ width: 1, height: 36, background: "rgba(255,255,255,0.3)", margin: "0 2px" }} />}
                    <div onClick={() => onSelectDate(date)} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 2, cursor: "pointer" }}>
                      <span style={{ color: "#aaa", fontSize: 9, fontWeight: "bold" }}>{DAY_LTRS[dow]}</span>
                      <div style={{ width: 20, height: 20, borderRadius: 6, background: hasCompletions(date) ? "#26ac14" : "#3a3a3a", outline: sel ? "2px solid #ce6e14" : today ? "2px solid white" : "none", transition: "all 0.2s" }} />
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// COMPONENT: HabitCard
// ─────────────────────────────────────────────

function HabitCard({ habit, isDone, completions, onToggle, isLocked }) {
  const [pulse, setPulse] = useState(false);
  const streak = calcStreak(habit.id, completions);
  const tier   = getTier(streak);

  function handleClick() {
    if (isLocked) return;
    setPulse(true);
    setTimeout(() => setPulse(false), 300);
    onToggle(habit.id);
  }

  return (
    <div onClick={handleClick} style={{
      width: "85%", background: isDone ? "#ce6e14" : "white",
      border: `1px solid ${isDone ? "#a85510" : "#ccc"}`, borderRadius: 8, padding: "10px 14px",
      cursor: isLocked ? "not-allowed" : "pointer", opacity: isLocked ? 0.6 : 1,
      userSelect: "none", fontSize: 14, color: isDone ? "white" : "#333",
      transform: pulse ? "scale(0.97)" : "scale(1)", transition: "all 0.2s cubic-bezier(0.34,1.56,0.64,1)",
      boxShadow: isDone ? "0 4px 16px rgba(206,110,20,0.35)" : "0 1px 4px rgba(0,0,0,0.08)", flexShrink: 0,
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <strong>{habit.name}</strong>
        <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
          {streak > 0 && (
            <span style={{
              fontSize: 9, color: isDone ? "white" : tier.color,
              background: isDone ? "rgba(255,255,255,0.2)" : `${tier.color}22`,
              border: `1px solid ${isDone ? "rgba(255,255,255,0.3)" : tier.color}`, borderRadius: 10, padding: "1px 6px",
            }}>
              🔥 {streak}j
            </span>
          )}
          <span style={{ fontSize: 15 }}>{isDone ? "✓" : "○"}</span>
        </div>
      </div>
      <div style={{ fontSize: 11, color: isDone ? "#ffd9b3" : "#999", marginTop: 3 }}>
        {habit.type}{habit.frequency ? ` · ${habit.frequency}` : ""}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// COMPONENT: Column (Morning / Afternoon / Evening)
// ─────────────────────────────────────────────

function Column({ title, habits, completions, selectedDate, onToggle, isLocked }) {
  const done     = habits.filter((h) => completions.some((c) => c.habitId === h.id && c.date === selectedDate)).length;
  const total    = habits.length;
  const allDone  = total > 0 && done === total;

  return (
    <div style={{ background: "#ececec", border: "1px solid rgba(58,58,58,0.5)", borderRadius: 10, padding: 14, flex: 1, minWidth: 0, height: "100%", display: "flex", flexDirection: "column", gap: 10, boxSizing: "border-box" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
        <h2 style={{ margin: 0, fontSize: 13, color: "#222", fontWeight: 700, letterSpacing: "0.08em" }}>
          {title}
          {isLocked && <span style={{ fontSize: 10, color: "#7700e6", fontWeight: 400 }}> 🔒 locked</span>}
        </h2>
        <span style={{ fontSize: 12, color: allDone ? "white" : "#888", background: allDone ? "#ce6e14" : "#ddd", borderRadius: 20, padding: "2px 8px", transition: "all 0.3s" }}>
          {done}/{total}
        </span>
      </div>
      <div style={{ flex: 1, minHeight: 0, overflowY: "auto", display: "flex", flexDirection: "column", gap: 10 }}>
        {habits.length === 0
          ? <div style={{ color: "#bbb", fontSize: 13, fontStyle: "italic", textAlign: "center", marginTop: 20 }}>No habits</div>
          : habits.map((h) => (
              <HabitCard key={h.id} habit={h}
                isDone={completions.some((c) => c.habitId === h.id && c.date === selectedDate)}
                completions={completions} onToggle={onToggle} isLocked={isLocked}
              />
            ))
        }
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// COMPONENT: HabitList (side panel)
// ─────────────────────────────────────────────

function HabitList({ habits, completions, selectedDate, onToggle, isLocked }) {
  const [search,      setSearch]      = useState("");
  const [filterType,  setFilterType]  = useState("");

  const filtered = habits.filter(
    (h) => h.name.toLowerCase().includes(search.toLowerCase()) && (filterType ? h.type === filterType : true)
  );
  const styleInput = { padding: "8px 12px", border: "1px solid #ccc", borderRadius: 8, fontSize: 13, outline: "none", background: "#f9f9f9", width: "100%", boxSizing: "border-box", flexShrink: 0 };

  return (
    <div style={{ background: "#ececec", border: "1px solid rgba(58,58,58,0.5)", borderRadius: 10, padding: 14, width: "100%", height: "100%", display: "flex", flexDirection: "column", gap: 10, boxSizing: "border-box" }}>
      <h2 style={{ margin: 0, fontSize: 13, color: "#222", fontWeight: 700, flexShrink: 0 }}>My Habits</h2>
      <input type="text" placeholder="Search..." value={search} onChange={(e) => setSearch(e.target.value)} style={styleInput} />
      <select value={filterType} onChange={(e) => setFilterType(e.target.value)} style={{ ...styleInput, cursor: "pointer" }}>
        <option value="">All types</option>
        {["Health", "Work", "Project", "Sport", "Other"].map((t) => <option key={t} value={t}>{t}</option>)}
      </select>
      <h3 style={{ margin: "4px 0 0", fontSize: 10, color: "#888", letterSpacing: "0.1em", flexShrink: 0 }}>LIST ({filtered.length})</h3>

      <div style={{ flex: 1, minHeight: 0, overflowY: "auto", display: "flex", flexDirection: "column", gap: 8 }}>
        {filtered.map((h) => {
          const done = completions.some((c) => c.habitId === h.id && c.date === selectedDate);
          const st   = calcStreak(h.id, completions);
          const t    = getTier(st);
          return (
            <div key={h.id} onClick={() => { if (!isLocked) onToggle(h.id); }} style={{
              background: done ? "#fff3e8" : "white", border: `1px solid ${done ? "#ce6e14" : "#ddd"}`,
              borderLeft: `4px solid ${st > 0 ? t.color : "#eee"}`, borderRadius: 7,
              padding: "10px 12px", cursor: isLocked ? "not-allowed" : "pointer", fontSize: 13, transition: "all 0.2s", flexShrink: 0,
            }}>
              <div style={{ fontWeight: "bold", color: "#222", display: "flex", justifyContent: "space-between" }}>
                <span>{h.name}</span>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  {isLocked && <span style={{ fontSize: 9, color: "#b10fe2" }}>🔒 locked</span>}
                  <span style={{ fontSize: 10, color: st > 0 ? t.color : "#bbb" }}>{st > 0 ? `🔥 ${st}d` : "—"}</span>
                </div>
              </div>
              <div style={{ fontSize: 11, color: "#999", marginTop: 3 }}>{h.type} · {h.period} · {h.frequency}</div>
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div style={{ color: "#bbb", fontSize: 13, fontStyle: "italic", textAlign: "center", marginTop: 20 }}>No habits found</div>
        )}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// COMPONENT: DeleteDialog
// ─────────────────────────────────────────────

function DeleteDialog({ habit, onConfirm, onCancel }) {
  if (!habit) return null;
  return (
    <div onClick={(e) => e.target === e.currentTarget && onCancel()}
      style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.75)", zIndex: 200, display: "flex", justifyContent: "center", alignItems: "center" }}
    >
      <div style={{ background: "#1a1a1a", border: "1px solid #ff4444", borderRadius: 14, padding: "30px 36px", width: 380, maxWidth: "90vw", display: "flex", flexDirection: "column", gap: 18, alignItems: "center" }}>
        <div style={{ width: 54, height: 54, borderRadius: "50%", background: "rgba(255,68,68,0.12)", border: "2px solid #ff4444", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26 }}>🗑️</div>
        <div style={{ textAlign: "center" }}>
          <div style={{ color: "white", fontSize: 17, fontWeight: 700, marginBottom: 8 }}>Delete this habit?</div>
          <div style={{ color: "#aaa", fontSize: 13, lineHeight: 1.6 }}>
            You are about to delete <strong style={{ color: "#ff9090" }}>"{habit.name}"</strong> and all its history.<br />
            <span style={{ color: "#ff4444", fontSize: 11 }}>This action is irreversible.</span>
          </div>
        </div>
        <div style={{ display: "flex", gap: 12, width: "100%" }}>
          <button onClick={onCancel} style={{ flex: 1, padding: "10px 0", background: "transparent", border: "1px solid #444", color: "#aaa", borderRadius: 9, fontSize: 14, cursor: "pointer" }}>Cancel</button>
          <button onClick={onConfirm} style={{ flex: 1, padding: "10px 0", background: "#c0392b", border: "1px solid #ff4444", color: "white", borderRadius: 9, fontSize: 14, cursor: "pointer", fontWeight: "bold" }}>🗑️ Delete</button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────
// COMPONENT: Modal (habit management)
// ─────────────────────────────────────────────

function Modal({ habits, onAdd, onEdit, onDelete, onClose }) {
  const [name,        setName]        = useState("");
  const [frequency,   setFrequency]   = useState("");
  const [period,      setPeriod]      = useState("");
  const [type,        setType]        = useState("");
  const [weekDays,    setWeekDays]    = useState([]);
  const [yearMonths,  setYearMonths]  = useState([]);
  const [editingId,   setEditingId]   = useState(null);
  const [habitToDelete, setHabitToDelete] = useState(null);
  const nameRef = useRef();

  function selectHabit(h) {
    setEditingId(h.id); setName(h.name); setFrequency(h.frequency);
    setPeriod(h.period); setType(h.type);
    setWeekDays(h.weekDays || []); setYearMonths(h.yearMonths || []);
    setTimeout(() => nameRef.current?.focus(), 80);
  }

  function reset() {
    setEditingId(null); setName(""); setFrequency(""); setPeriod(""); setType(""); setWeekDays([]); setYearMonths([]);
  }

  function handleSubmit() {
    if (!name.trim()) { nameRef.current?.focus(); return; }
    const data = { name: name.trim(), frequency, period, type, weekDays, yearMonths };
    if (editingId) { onEdit({ id: editingId, ...data }); } else { onAdd(data); }
    reset();
  }

  function toggleDay(d)   { setWeekDays(weekDays.includes(d)     ? weekDays.filter((x) => x !== d)     : [...weekDays,    d]); }
  function toggleMonth(m) { setYearMonths(yearMonths.includes(m) ? yearMonths.filter((x) => x !== m)   : [...yearMonths,  m]); }
  function toggleAllMonths() { setYearMonths(yearMonths.length === MONTHS_YEAR.length ? [] : [...MONTHS_YEAR]); }

  const full   = habits.length >= MAX_HABITS && !editingId;
  const isEdit = !!editingId;
  const si = { padding: "10px 12px", border: "1px solid #444", borderRadius: 8, fontSize: 14, background: "#2a2a2a", color: "white", outline: "none", width: "100%", boxSizing: "border-box" };
  const sc = (active) => ({ padding: "4px 10px", borderRadius: 20, fontSize: 11, cursor: "pointer", userSelect: "none", border: `1px solid ${active ? "#ce6e14" : "#444"}`, background: active ? "rgba(206,110,20,0.22)" : "#2a2a2a", color: active ? "#ff9040" : "#666", transition: "all 0.15s" });

  return (
    <>
      {habitToDelete && (
        <DeleteDialog habit={habitToDelete}
          onConfirm={() => { onDelete(habitToDelete.id); if (editingId === habitToDelete.id) reset(); setHabitToDelete(null); }}
          onCancel={() => setHabitToDelete(null)}
        />
      )}
      <div onClick={(e) => e.target === e.currentTarget && onClose()}
        style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.6)", zIndex: 100, display: "flex", justifyContent: "center", alignItems: "center" }}
      >
        <div style={{ background: "#1e1e1e", borderRadius: 14, padding: 30, width: 760, maxWidth: "95vw", maxHeight: "88vh", overflowY: "auto", display: "flex", gap: 30, position: "relative", boxShadow: "0 20px 60px rgba(0,0,0,0.6)", color: "white" }}>
          <button onClick={onClose} style={{ position: "absolute", top: 14, left: 16, background: "none", border: "none", color: "#aaa", fontSize: 22, cursor: "pointer" }}>✕</button>

          {/* ── Form ── */}
          <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 14, paddingTop: 20 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <h2 style={{ margin: 0, fontSize: 18 }}>{isEdit ? "✏️ Edit habit" : "New habit"}</h2>
              {full && !isEdit && <span style={{ color: "#ff6b6b", fontSize: 13 }}>(max {MAX_HABITS} reached)</span>}
              {isEdit && <button onClick={reset} style={{ marginLeft: "auto", background: "transparent", border: "1px solid #555", color: "#aaa", borderRadius: 7, padding: "3px 10px", fontSize: 12, cursor: "pointer" }}>Cancel</button>}
            </div>

            {isEdit && (
              <div style={{ background: "rgba(206,110,20,0.12)", border: "1px solid rgba(206,110,20,0.35)", borderRadius: 8, padding: "8px 12px", fontSize: 12, color: "#ce6e14" }}>
                Editing <strong>{habits.find((h) => h.id === editingId)?.name}</strong>
              </div>
            )}

            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <label style={{ fontSize: 13, color: "#aaa" }}>Name</label>
              <input ref={nameRef} type="text" value={name} onChange={(e) => setName(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && handleSubmit()}
                placeholder="E.g.: Meditation, Running..." style={si} disabled={full} />
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <label style={{ fontSize: 13, color: "#aaa" }}>Frequency</label>
              <select value={frequency} onChange={(e) => { setFrequency(e.target.value); setWeekDays([]); setYearMonths([]); }} style={si} disabled={full}>
                <option value="">-- Choose --</option>
                <option value="Daily">Daily</option>
                <option value="Weekly">Weekly</option>
                <option value="Monthly">Monthly</option>
              </select>
              {frequency === "Weekly" && (
                <div style={{ background: "#252525", border: "1px solid #383838", borderRadius: 8, padding: "10px 12px" }}>
                  <div style={{ fontSize: 11, color: "#888", marginBottom: 8 }}>Days selected ({weekDays.length} selected{weekDays.length > 1 ? "" : ""})</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {WEEKDAYS.map((d) => <span key={d} style={sc(weekDays.includes(d))} onClick={() => toggleDay(d)}>{d.slice(0, 3)}</span>)}
                  </div>
                </div>
              )}
              {frequency === "Monthly" && (
                <div style={{ background: "#252525", border: "1px solid #383838", borderRadius: 8, padding: "10px 12px" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                    <div style={{ fontSize: 11, color: "#888" }}>Months selected ({yearMonths.length}/12)</div>
                    <span onClick={toggleAllMonths} style={sc(yearMonths.length === MONTHS_YEAR.length)}>{yearMonths.length === MONTHS_YEAR.length ? "✓ All" : "All"}</span>
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {MONTHS_YEAR.map((m) => <span key={m} style={sc(yearMonths.includes(m))} onClick={() => toggleMonth(m)}>{m.slice(0, 3)}</span>)}
                  </div>
                </div>
              )}
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <label style={{ fontSize: 13, color: "#aaa" }}>Period</label>
              <select value={period} onChange={(e) => setPeriod(e.target.value)} style={si} disabled={full}>
                <option value="">-- Choose --</option>
                <option value="morning">Morning</option>
                <option value="afternoon">Afternoon</option>
                <option value="evening">Evening</option>
              </select>
            </div>

            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <label style={{ fontSize: 13, color: "#aaa" }}>Type</label>
              <select value={type} onChange={(e) => setType(e.target.value)} style={si} disabled={full}>
                <option value="">-- Choose --</option>
                {["Health", "Work", "Project", "Sport", "Other"].map((o) => <option key={o} value={o}>{o}</option>)}
              </select>
            </div>

            <button onClick={handleSubmit} disabled={full} style={{ marginTop: 8, padding: 12, background: full ? "#444" : isEdit ? "#1e7bcf" : "#ce6e14", color: "white", border: "none", borderRadius: 10, fontSize: 15, cursor: full ? "not-allowed" : "pointer", transition: "background 0.2s" }}>
              {isEdit ? "💾 Save changes" : "Save"}
            </button>
          </div>

          {/* ── Habit list ── */}
          <div style={{ width: 230, flexShrink: 0, display: "flex", flexDirection: "column", gap: 10, paddingTop: 20 }}>
            <h3 style={{ margin: "0 0 6px", fontSize: 14, color: "#aaa", borderBottom: "1px solid #333", paddingBottom: 6 }}>
              Habits ({habits.length}/{MAX_HABITS})
            </h3>
            <p style={{ margin: 0, fontSize: 10, color: "#555", lineHeight: 1.4 }}>Click a habit to edit it.</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 8, overflowY: "auto", maxHeight: 460 }}>
              {habits.length === 0
                ? <p style={{ fontSize: 13, color: "#555", fontStyle: "italic" }}>No habits yet.</p>
                : habits.map((h) => {
                    const sel = editingId === h.id;
                    return (
                      <div key={h.id} onClick={() => selectHabit(h)} style={{
                        background: sel ? "rgba(30,123,207,0.18)" : "#2a2a2a", border: `1px solid ${sel ? "#1e7bcf" : "#444"}`,
                        borderRadius: 8, padding: "8px 10px", fontSize: 13, color: "#ddd",
                        display: "flex", justifyContent: "space-between", alignItems: "flex-start",
                        cursor: "pointer", transition: "all 0.18s",
                        transform: sel ? "translateX(-3px)" : "translateX(0)", boxShadow: sel ? "4px 0 0 #1e7bcf inset" : "none",
                      }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <strong style={{ display: "block", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", color: sel ? "#5db8ff" : "#ddd" }}>
                            {h.name}
                          </strong>
                          <span style={{ display: "block", fontSize: 11, color: "#888", marginTop: 2 }}>
                            {h.type} · {h.period} · {h.frequency}
                            {h.weekDays?.length > 0 && ` · ${h.weekDays.map((d) => d.slice(0, 3)).join(", ")}`}
                            {h.yearMonths?.length > 0 && h.yearMonths.length < 12 && ` · ${h.yearMonths.length} months`}
                            {h.yearMonths?.length === 12 && " · all year"}
                          </span>
                          {sel && <span style={{ fontSize: 10, color: "#1e7bcf", marginTop: 3, display: "block" }}>✏️ Currently editing</span>}
                        </div>
                        <button onClick={(e) => { e.stopPropagation(); setHabitToDelete(h); }}
                          title="Delete"
                          style={{ background: "none", border: "none", color: "#555", cursor: "pointer", fontSize: 14, padding: "0 0 0 6px", flexShrink: 0 }}
                          onMouseOver={(e) => (e.currentTarget.style.color = "#ff4444")}
                          onMouseOut={(e)  => (e.currentTarget.style.color = "#555")}
                        >✕</button>
                      </div>
                    );
                  })
              }
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

// ─────────────────────────────────────────────
// COMPONENT: XPToast
// ─────────────────────────────────────────────

function XPToast({ xp, visible }) {
  return (
    <div style={{
      position: "fixed", bottom: 32, right: 32, zIndex: 999,
      background: "#ce6e14", color: "white", padding: "10px 20px",
      borderRadius: 30, fontSize: 18, fontWeight: "bold",
      boxShadow: "0 8px 30px rgba(206,110,20,0.5)",
      transform: visible ? "translateY(0) scale(1)" : "translateY(20px) scale(0.8)",
      opacity: visible ? 1 : 0, transition: "all 0.4s cubic-bezier(0.34,1.56,0.64,1)", pointerEvents: "none",
    }}>
      +{xp} XP 🔥
    </div>
  );
}

// ─────────────────────────────────────────────
// ROOT COMPONENT: App
// ─────────────────────────────────────────────

export default function App() {
  const [habits,      setHabits]      = useState([]);
  const [completions, setCompletions] = useState([]);
  const [xpTotal,     setXpTotal]     = useState(650);
  const [selectedDate, setSelectedDate] = useState(todayISO());
  const [modalOpen,    setModalOpen]   = useState(false);
  const [toast,        setToast]       = useState({ visible: false, xp: 0 });
  const toastTimer = useRef(null);

  function addHabit({ name, frequency, period, type, weekDays, yearMonths }) {
    if (habits.length >= MAX_HABITS) return;
    setHabits((prev) => [...prev, {
      id: generateID(), name, frequency, period, type,
      weekDays: weekDays || [], yearMonths: yearMonths || [],
      xpPerCompletion: 10, createdOn: todayISO(), active: true,
    }]);
  }

  function editHabit({ id, name, frequency, period, type, weekDays, yearMonths }) {
    setHabits((prev) => prev.map((h) => h.id === id ? { ...h, name, frequency, period, type, weekDays, yearMonths } : h));
  }

  function deleteHabit(id) {
    setHabits((prev)      => prev.filter((h) => h.id !== id));
    setCompletions((prev) => prev.filter((c) => c.habitId !== id));
  }

  function toggleCompletion(habitId) {
    const alreadyDone = completions.some((c) => c.habitId === habitId && c.date === selectedDate);
    const habit = habits.find((h) => h.id === habitId);
    if (!habit) return;
    if (alreadyDone) {
      const comp = completions.find((c) => c.habitId === habitId && c.date === selectedDate);
      setCompletions((prev) => prev.filter((c) => !(c.habitId === habitId && c.date === selectedDate)));
      setXpTotal((prev) => Math.max(0, prev - (comp?.xpEarned || 0)));
    } else {
      setCompletions((prev) => [...prev, { id: generateID(), habitId, date: selectedDate, xpEarned: habit.xpPerCompletion, timestamp: Date.now() }]);
      setXpTotal((prev) => prev + habit.xpPerCompletion);
      clearTimeout(toastTimer.current);
      setToast({ visible: true, xp: habit.xpPerCompletion });
      toastTimer.current = setTimeout(() => setToast({ visible: false, xp: 0 }), 2000);
    }
  }

  const morningHabits   = habits.filter((h) => h.period === "morning");
  const afternoonHabits = habits.filter((h) => h.period === "afternoon");
  const eveningHabits   = habits.filter((h) => h.period === "evening");
  const isLocked        = selectedDate < todayISO();

  return (
    <div style={{ minHeight: "100vh", background: "#f5f5f5", fontFamily: "'DM Mono', monospace", display: "flex", flexDirection: "column" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; } body { margin: 0; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ce6e14; border-radius: 3px; }
      `}</style>

      <AppHeader />
      <TierLegend />
      <Hero xpTotal={xpTotal} habits={habits} completions={completions} />
      <DateBar selectedDate={selectedDate} onSelectDate={setSelectedDate} onOpenModal={() => setModalOpen(true)} completions={completions} />

      <div style={{ display: "flex", gap: 10, padding: "10px 24px", background: "#e7e7e7", flex: 1, minHeight: 300, boxSizing: "border-box", overflow: "hidden" }}>
        <div style={{ width: "22%", flexShrink: 0, height: "100%" }}>
          <HabitList habits={habits} completions={completions} selectedDate={selectedDate} onToggle={toggleCompletion} isLocked={isLocked} />
        </div>
        <div style={{ flex: 1, display: "flex", gap: 10, minWidth: 0, height: "100%" }}>
          <Column title="MORNING"   habits={morningHabits}   completions={completions} selectedDate={selectedDate} onToggle={toggleCompletion} isLocked={isLocked} />
          <Column title="AFTERNOON" habits={afternoonHabits} completions={completions} selectedDate={selectedDate} onToggle={toggleCompletion} isLocked={isLocked} />
          <Column title="EVENING"   habits={eveningHabits}   completions={completions} selectedDate={selectedDate} onToggle={toggleCompletion} isLocked={isLocked} />
        </div>
      </div>

      <footer style={{ background: "#1a1a1a", color: "#555", textAlign: "center", padding: "16px", fontSize: 13 }}>© 2026 – DailyFlame mANU</footer>

      {modalOpen && <Modal habits={habits} onAdd={addHabit} onEdit={editHabit} onDelete={deleteHabit} onClose={() => setModalOpen(false)} />}
      <XPToast xp={toast.xp} visible={toast.visible} />
    </div>
  );
}