// COMPONENT: FlameTooltip
// ─────────────────────────────────────────────

function FlameTooltip({ habit, streak, tier, breaks, streakStart }) {
  const rows = [
    { label: "Allumée depuis",    value: formatDate(streakStart) },
    { label: "Jours consécutifs", value: streak > 0 ? `${streak}j` : "Éteinte" },
    { label: "Extinctions",       value: String(breaks), color: breaks > 0 ? "#ff7070" : "#6bff9b" },
  ];
  return (
    <div style={{
      position: "absolute", bottom: "calc(100% + 8px)", left: "50%", transform: "translateX(-50%)",
      background: "#111", border: `1px solid ${tier.color}`, borderRadius: 9,
      padding: "10px 13px", width: 186, zIndex: 300, pointerEvents: "none",
      boxShadow: `0 6px 24px ${tier.color}44`,
    }}>
      {/* Arrow */}
      <div style={{
        position: "absolute", bottom: -6, left: "50%",
        transform: "translateX(-50%) rotate(45deg)", width: 10, height: 10,
        background: "#111", borderRight: `1px solid ${tier.color}`, borderBottom: `1px solid ${tier.color}`,
      }} />
      {/* Name */}
      <div style={{
        color: "white", fontWeight: 700, fontSize: 12, marginBottom: 7,
        borderBottom: "1px solid #252525", paddingBottom: 6,
        overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
      }}>
        {habit.name}
      </div>
      {/* Tier badge */}
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 7 }}>
        <div style={{ width: 9, height: 9, borderRadius: "50%", background: tier.color }} />
        <span style={{ color: tier.color, fontSize: 11, fontWeight: "bold" }}>{tier.label}</span>
      </div>
      {/* Stats */}
      {rows.map(({ label, value, color }) => (
        <div key={label} style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
          <span style={{ color: "#555", fontSize: 10 }}>{label}</span>
          <span style={{ color: color || "#bbb", fontSize: 10, fontWeight: "bold" }}>{value}</span>
        </div>
      ))}
    </div>
  );
}

// ─────────────────────────────────────────────
// COMPONENT: FlameCell
// ─────────────────────────────────────────────

function FlameCell({ habit, completions }) {
  const [hovered, setHovered] = useState(false);
  const streak      = calcStreak(habit.id, completions);
  const breaks      = calcBreaks(habit.id, completions);
  const streakStart = calcStreakStart(habit.id, completions);
  const tier        = getTier(streak);
  const isLit       = streak > 0;

  return (
    <div
      style={{ position: "relative", display: "flex", flexDirection: "column", alignItems: "center", cursor: "default" }}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
    >
      {hovered && <FlameTooltip habit={habit} streak={streak} tier={tier} breaks={breaks} streakStart={streakStart} />}
      <div style={{
        transition: "transform 0.2s ease",
        transform: hovered ? "scale(1.18) translateY(-3px)" : "scale(1)",
        filter: isLit ? `drop-shadow(0 0 7px ${tier.color}90)` : "none",
      }}>
        <FlameIcon color={tier.color} size={24} lit={isLit} />
      </div>
      <div style={{
        color: isLit ? tier.color : "#3a3a3a", fontSize: 8,
        textAlign: "center", marginTop: 1, maxWidth: 52,
        overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
      }}>
        {habit.name}
      </div>
    </div>
  );
}

